<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CraftHaven Studio</title>
    <link rel="stylesheet" href="./estilo_pagina_compra.css">
</head>
<body>

<header>
    <div class="header-container">
            <div class="logo">
                <a href="../index.html">
                    <div class="logo-icon"></div>
                    <h1>CraftHaven Studio<br><span class="logo-subtitle">Handcrafted Quality</span></h1>
                </a>
            </div>

        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../Productos/Productos.html">Products</a></li>
                <li><a href="../Contacto/contactos.html">Contact</a></li>
            </ul>
        </nav>

        <a href="../Carrito/pagina_carrito.html" class="cart-button">
            🛒 Cart <span class="cart-count">0</span>
        </a>
    </div>
</header>

<main class="checkout-main-container">
    <h1 class="section-title">Checkout</h1>

    <div class="checkout-grid">

        <!-- LEFT COLUMN -->
        <section class="checkout-form-column">
            <div class="checkout-form">

                <h2 class="form-section-title">Payment Method</h2>

                <div class="payment-methods">
                    <label class="payment-option">
                        <input type="radio" name="payment-method" value="mercadopago" checked>
                        <div class="payment-card">
                            💳 Credit / Debit Card
                        </div>
                    </label>

                    <label class="payment-option">
                        <input type="radio" name="payment-method" value="transferencia">
                        <div class="payment-card">
                            🏦 Bank Transfer
                        </div>
                    </label>
                </div>

                <!-- FINAL BUTTON -->
                <button id="main-pay-button" class="submit-order-btn">
                    Proceed to Payment →
                </button>

                <div id="status-message"></div>

            </div>
        </section>

        <!-- RIGHT COLUMN -->
        <aside class="checkout-summary-column">
            <div class="summary-card">
                <h2>Summary</h2>
                <div id="order-items"></div>

                <div class="summary-line">
                    <span>Total</span>
                    <span id="total-price">$0</span>
                </div>
            </div>
        </aside>

    </div>
</main>

<script src="./finalizar_compra.js"></script>
</body>
</html>
